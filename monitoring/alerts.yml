groups:
  - name: opencode-orquestrator.rules
    rules:
      - alert: HighErrorRate
        expr: |
          rate(opencode_errors_total[5m])
          / rate(opencode_messages_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 5%"
          description: "Error rate is {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, rate(opencode_request_duration_seconds_bucket[5m])) > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is {{ $value | humanizeDuration }}"

      - alert: NoMessagesProcessed
        expr: |
          rate(opencode_messages_total[10m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No messages processed"
          description: "No messages processed in the last 30 minutes"

      - alert: HighMemoryUsage
        expr: |
          opencode_memory_bytes{type="heap_used"} / opencode_memory_bytes{type="heap_total"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Heap usage is {{ $value | humanizePercentage }}"

      - alert: TooManyActiveSessions
        expr: |
          opencode_active_sessions > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many active sessions"
          description: "{{ $value }} active sessions (max: 20)"

      - alert: InstanceDown
        expr: |
          up{job="opencode-orquestrator"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OpenCode Orquestrator is down"
          description: "Instance has been down for more than 1 minute"

      - alert: TelegramAPIErrors
        expr: |
          rate(opencode_telegram_api_calls_total{status="error"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Telegram API errors"
          description: "Telegram API error rate is {{ $value | humanizePercentage }}"